# ============================================================================
# Prediction Markets — Kalshi (CFTC-regulated US exchange)
# Call: POST /api/relay   {"name": "<name>", "params": {...}}
# ============================================================================
category: "Prediction Markets — Kalshi"
note: >
  Kalshi is the CFTC-regulated US prediction-market exchange (elections, economics, weather,
  sports, world events). Fourth prediction-market source alongside Polymarket, 42.space and Aster.
  Relay signs every upstream request server-side (RSA) — agents just call by name, no key handling.
  Hierarchy: series (recurring template, e.g. KXHIGHNY) → event (one instance, e.g. a given day's
  market group) → market (one tradable yes/no contract). Prices appear both in cents (1-99 =
  implied probability %) and as *_dollars decimal strings (0-1) depending on the field.

# ── Critical Field Map ──────────────────────────────────────────────────────
critical_field_map:
  ticker:
    source: "markets[].ticker from kalshi_markets (or nested markets in kalshi_events with_nested_markets:true)"
    used_by: [kalshi_market, kalshi_market_orderbook, kalshi_trades, kalshi_candlesticks]
  event_ticker:
    source: "markets[].event_ticker from kalshi_markets"
    used_by: [kalshi_event]
  series_ticker:
    source: "event.series_ticker from kalshi_event — NOT present on the market object"
    used_by: [kalshi_series, kalshi_candlesticks]
    note: "kalshi_candlesticks needs BOTH series_ticker and ticker — fetch the event first"

# ── Recommended Call Order ──────────────────────────────────────────────────
recommended_call_order:
  - {step: 1, action: "kalshi_markets {status:'open', limit} to browse tradable markets (or kalshi_events {with_nested_markets:true} to browse by event)"}
  - {step: 2, action: "kalshi_market {ticker} for bid/ask/volume; kalshi_market_orderbook {ticker} for the book; kalshi_trades {ticker} for the tape"}
  - {step: 3, action: "for price history: kalshi_event {event_ticker} → event.series_ticker → kalshi_candlesticks {series_ticker, ticker, start_ts, end_ts, period_interval}"}

global_gotchas:
  - "Prices: cents fields are 1-99 ints (= implied probability %); *_dollars / *_fp fields are decimal strings 0-1. Same quote, two encodings"
  - "status accepts a SINGLE value (unopened|open|paused|closed|settled) — no comma lists"
  - "kalshi_candlesticks: start_ts / end_ts / period_interval all REQUIRED; series_ticker only obtainable via kalshi_event"
  - "Empty orderbook / empty candlesticks on young or thin markets is normal, not an error"
  - "kalshi_series_list without filters is huge (~550KB) and may hit the relay auto-truncation (_clawby_truncated marker) — pass category to narrow"
  - "All timestamps in params are unix SECONDS (close_time etc. in responses are ISO strings)"

interfaces:
  - name: "kalshi_markets"
    summary: "List/filter Kalshi markets (the core browse endpoint)"
    params:
      - {name: limit,         required: false, format: "int 0-1000, default 100", example: 50}
      - {name: cursor,        required: false, format: "pagination cursor from previous response"}
      - {name: event_ticker,  required: false, format: "filter by event", example: "KXHIGHNY-25JUL21"}
      - {name: series_ticker, required: false, format: "filter by series", example: "KXHIGHNY"}
      - {name: status,        required: false, format: "unopened|open|paused|closed|settled (single value)", example: "open"}
      - {name: tickers,       required: false, format: "comma-separated market tickers"}
      - {name: min_close_ts,  required: false, format: "unix s", note: "also max_close_ts, min/max_created_ts, min/max_settled_ts, min_updated_ts"}
    example: '{"name":"kalshi_markets","params":{"status":"open","limit":50}}'

  - name: "kalshi_market"
    summary: "Single market detail: yes/no bid-ask, last price, volume, open interest, rules"
    params:
      - {name: ticker, required: true, format: "market ticker from kalshi_markets", example: "KXHIGHNY-25JUL21-B54.5"}
    example: '{"name":"kalshi_market","params":{"ticker":"<ticker>"}}'

  - name: "kalshi_market_orderbook"
    summary: "Order book for a market (yes/no price levels)"
    params:
      - {name: ticker, required: true,  format: "market ticker"}
      - {name: depth,  required: false, format: "int, levels per side", example: 10}
    gotchas:
      - "Returns orderbook_fp with yes_dollars/no_dollars arrays of [price_decimal_string, qty]; empty arrays = no resting orders"
    example: '{"name":"kalshi_market_orderbook","params":{"ticker":"<ticker>","depth":10}}'

  - name: "kalshi_trades"
    summary: "Public trade tape (all markets or filtered to one)"
    params:
      - {name: ticker, required: false, format: "market ticker filter"}
      - {name: limit,  required: false, format: "int 1-1000, default 100", example: 100}
      - {name: cursor, required: false, format: "pagination cursor"}
      - {name: min_ts, required: false, format: "unix s", note: "also max_ts"}
    example: '{"name":"kalshi_trades","params":{"ticker":"<ticker>","limit":100}}'

  - name: "kalshi_events"
    summary: "List events (an event groups related markets, e.g. one game / one election day)"
    params:
      - {name: limit,               required: false, format: "int 1-200, default 200", example: 50}
      - {name: cursor,              required: false, format: "pagination cursor"}
      - {name: status,              required: false, format: "unopened|open|closed|settled", example: "open"}
      - {name: series_ticker,       required: false, format: "filter by series"}
      - {name: with_nested_markets, required: false, format: "true|false", example: true, note: "true embeds each event's full markets array"}
      - {name: min_close_ts,        required: false, format: "unix s", note: "also min_updated_ts, tickers, with_milestones"}
    example: '{"name":"kalshi_events","params":{"status":"open","with_nested_markets":true,"limit":20}}'

  - name: "kalshi_event"
    summary: "Single event with markets — the ONLY place to get series_ticker for candlesticks"
    params:
      - {name: event_ticker,        required: true,  format: "from kalshi_markets.markets[].event_ticker"}
      - {name: with_nested_markets, required: false, format: "true|false"}
    example: '{"name":"kalshi_event","params":{"event_ticker":"<event_ticker>"}}'

  - name: "kalshi_series_list"
    summary: "Series catalog (recurring market templates) by category"
    params:
      - {name: category,                 required: false, format: "e.g. Politics|Economics|Sports|Climate and Weather|Financials|Companies|World", example: "Economics"}
      - {name: tags,                     required: false, format: "tag filter"}
      - {name: include_product_metadata, required: false, format: "true|false"}
      - {name: include_volume,           required: false, format: "true|false"}
    gotchas:
      - "Unfiltered response is ~550KB — pass category to avoid truncation"
    example: '{"name":"kalshi_series_list","params":{"category":"Economics"}}'

  - name: "kalshi_series"
    summary: "Single series detail (frequency, category, settlement sources)"
    params:
      - {name: series_ticker, required: true, format: "e.g. from kalshi_event.event.series_ticker", example: "KXHIGHNY"}
    example: '{"name":"kalshi_series","params":{"series_ticker":"KXHIGHNY"}}'

  - name: "kalshi_candlesticks"
    summary: "OHLC candlesticks for a market (yes-side price history)"
    params:
      - {name: series_ticker,   required: true, format: "via kalshi_event of the market's event_ticker"}
      - {name: ticker,          required: true, format: "market ticker"}
      - {name: start_ts,        required: true, format: "unix s", example: 1784489000}
      - {name: end_ts,          required: true, format: "unix s", example: 1784575000}
      - {name: period_interval, required: true, format: "1|60|1440 (minutes: 1m|1h|1d)", example: 60}
      - {name: include_latest_before_start, required: false, format: "true|false, default false"}
    gotchas:
      - "All three of start_ts/end_ts/period_interval are required — omitting any returns an error"
      - "Markets settled before Kalshi's historical cutoff return no data here"
    example: '{"name":"kalshi_candlesticks","params":{"series_ticker":"<series>","ticker":"<ticker>","start_ts":1784489000,"end_ts":1784575000,"period_interval":60}}'

  - name: "kalshi_exchange_status"
    summary: "Exchange/trading active flags"
    params: []
    example: '{"name":"kalshi_exchange_status","params":{}}'

  - name: "kalshi_exchange_schedule"
    summary: "Standard trading hours + maintenance windows"
    params: []
    example: '{"name":"kalshi_exchange_schedule","params":{}}'
