# ============================================================================
# Beacon REST — eth_beacon
# Note: Beacon API uses REST protocol, not standard JSON-RPC
# When forwarding via /api/rpc, set method to the REST path and params to the request body or query params
# ============================================================================
chain: "eth_beacon"            # chain param for /api/rpc
type: Beacon
slug: "eth_beacon"
status: unverified             # ⚠️ not verified on the current key
api_style: REST
how_to_call: |
  Beacon REST API (not JSON-RPC): make direct GET/POST requests to Beacon node REST endpoints
  For forwarding via /api/rpc, refer to the specific implementation; native access: GET /eth/v1/beacon/genesis, etc.
notes:
  - "The Ethereum Beacon Chain is Ethereum's consensus layer, responsible for PoS validator management and block proposals"
  - "The Beacon API is a pure REST interface (not JSON-RPC); responses are in JSON format"
  - "Access is limited to premium plan users only"
  - "state_id valid values: head / genesis / finalized / justified / <slot> / <hex_stateRoot>"
  - "block_id valid values: head / genesis / finalized / <slot> / <hex_blockRoot>"
  - "⚠️ not verified on the current key; availability depends on the plan"
endpoints_or_methods:
  # ---------- Beacon — state and blocks ----------
  - name: "GET /eth/v1/beacon/genesis"
    summary: "Returns Genesis details for the chain (timestamp, validator root, fork version)"
    params: "none"
    example: "GET /eth/v1/beacon/genesis"
  - name: "GET /eth/v1/beacon/states/{state_id}/root"
    summary: "Returns the SSZ HashTreeRoot for the specified state"
    params: "state_id(path): head/genesis/finalized/<slot>/<stateRoot>"
    example: "GET /eth/v1/beacon/states/head/root"
  - name: "GET /eth/v1/beacon/states/{state_id}/fork"
    summary: "Returns the Fork object for the specified state"
    params: "state_id(path)"
    example: "GET /eth/v1/beacon/states/head/fork"
  - name: "GET /eth/v1/beacon/states/{state_id}/finality_checkpoints"
    summary: "Returns finality checkpoints (justified/finalized) for the specified state"
    params: "state_id(path)"
    example: "GET /eth/v1/beacon/states/head/finality_checkpoints"
  - name: "GET /eth/v1/beacon/states/{state_id}/validators"
    summary: "Returns the validator list in the state"
    params: "state_id(path); id([](query, optional)); status([](query, optional))"
    example: "GET /eth/v1/beacon/states/head/validators?status=active_ongoing"
  - name: "POST /eth/v1/beacon/states/{state_id}/validators"
    summary: "Batch-queries validators by ID list (via POST)"
    params: "state_id(path); body: {ids: [string], statuses: [string]}"
    example: "POST /eth/v1/beacon/states/head/validators  {\"ids\":[\"0\",\"1\"]}"
  - name: "GET /eth/v1/beacon/states/{state_id}/validators/{validator_id}"
    summary: "Returns a single validator's details by ID"
    params: "state_id(path); validator_id(path): index or pubkey"
    example: "GET /eth/v1/beacon/states/head/validators/0"
  - name: "GET /eth/v1/beacon/states/{state_id}/validator_balances"
    summary: "Returns the validator balance list in the state"
    params: "state_id(path); id([](query, optional))"
    example: "GET /eth/v1/beacon/states/head/validator_balances"
  - name: "GET /eth/v1/beacon/states/{state_id}/committees"
    summary: "Returns all committee info in the state"
    params: "state_id(path); epoch/index/slot(query, optional)"
    example: "GET /eth/v1/beacon/states/head/committees"
  - name: "GET /eth/v1/beacon/states/{state_id}/sync_committees"
    summary: "Returns sync committee info in the state"
    params: "state_id(path); epoch(query, optional)"
    example: "GET /eth/v1/beacon/states/head/sync_committees"
  - name: "GET /eth/v1/beacon/headers"
    summary: "Returns the list of block headers"
    params: "slot/parent_root(query, optional)"
    example: "GET /eth/v1/beacon/headers"
  - name: "GET /eth/v1/beacon/headers/{block_id}"
    summary: "Returns a single block header by block_id"
    params: "block_id(path): head/genesis/finalized/<slot>/<blockRoot>"
    example: "GET /eth/v1/beacon/headers/head"
  - name: "GET /eth/v2/beacon/blocks/{block_id}"
    summary: "Returns the full block by block_id (including execution payload)"
    params: "block_id(path)"
    example: "GET /eth/v2/beacon/blocks/head"
  - name: "GET /eth/v1/beacon/blocks/{block_id}/root"
    summary: "Returns the HashTreeRoot of the block"
    params: "block_id(path)"
    example: "GET /eth/v1/beacon/blocks/head/root"
  - name: "GET /eth/v1/beacon/blocks/{block_id}/attestations"
    summary: "Returns the list of attestations in the block"
    params: "block_id(path)"
    example: "GET /eth/v1/beacon/blocks/head/attestations"
  - name: "POST /eth/v1/beacon/blocks"
    summary: "Publishes a signed Beacon block"
    params: "body: SignedBeaconBlock object (JSON)"
    example: "POST /eth/v1/beacon/blocks  {\"message\":{...},\"signature\":\"0x...\"}"
  - name: "POST /eth/v1/beacon/blinded_blocks"
    summary: "Publishes a signed blinded Beacon block"
    params: "body: SignedBlindedBeaconBlock object"
    example: "POST /eth/v1/beacon/blinded_blocks  {\"message\":{...},\"signature\":\"0x...\"}"
  # ---------- Beacon Pool ----------
  - name: "GET /eth/v1/beacon/pool/attestations"
    summary: "Returns the attestation list from the operations pool"
    params: "slot/committee_index(query, optional)"
    example: "GET /eth/v1/beacon/pool/attestations"
  - name: "POST /eth/v1/beacon/pool/attestations"
    summary: "Submits attestation objects to the node"
    params: "body: [Attestation]"
    example: "POST /eth/v1/beacon/pool/attestations  [{\"aggregation_bits\":\"0x...\",\"data\":{...},\"signature\":\"0x...\"}]"
  - name: "GET /eth/v1/beacon/pool/attester_slashings"
    summary: "Returns the attester slashing list from the pool"
    params: "none"
    example: "GET /eth/v1/beacon/pool/attester_slashings"
  - name: "POST /eth/v1/beacon/pool/attester_slashings"
    summary: "Submits an AttesterSlashing object to the node pool"
    params: "body: AttesterSlashing"
    example: "POST /eth/v1/beacon/pool/attester_slashings"
  - name: "GET /eth/v1/beacon/pool/proposer_slashings"
    summary: "Returns the proposer slashing list from the pool"
    params: "none"
    example: "GET /eth/v1/beacon/pool/proposer_slashings"
  - name: "POST /eth/v1/beacon/pool/sync_committees"
    summary: "Submits sync committee signatures to the node"
    params: "body: [SyncCommitteeMessage]"
    example: "POST /eth/v1/beacon/pool/sync_committees"
  - name: "GET /eth/v1/beacon/pool/voluntary_exits"
    summary: "Returns the voluntary exit list from the pool"
    params: "none"
    example: "GET /eth/v1/beacon/pool/voluntary_exits"
  - name: "POST /eth/v1/beacon/pool/voluntary_exits"
    summary: "Submits a SignedVoluntaryExit to the node pool"
    params: "body: SignedVoluntaryExit"
    example: "POST /eth/v1/beacon/pool/voluntary_exits"
  # ---------- Beacon Rewards ----------
  - name: "GET /eth/v1/beacon/rewards/blocks/{block_id}"
    summary: "Returns reward info for the specified block"
    params: "block_id(path)"
    example: "GET /eth/v1/beacon/rewards/blocks/head"
  - name: "POST /eth/v1/beacon/rewards/sync_committee/{block_id}"
    summary: "Returns sync committee rewards for the specified block"
    params: "block_id(path); body: [validator_id]"
    example: "POST /eth/v1/beacon/rewards/sync_committee/head  [\"0\",\"1\"]"
  - name: "POST /eth/v1/beacon/rewards/attestations/{epoch}"
    summary: "Returns attestation rewards for the specified epoch"
    params: "epoch(path); body: [validator_id]"
    example: "POST /eth/v1/beacon/rewards/attestations/100  [\"0\",\"1\"]"
  # ---------- Builder ----------
  - name: "GET /eth/v1/builder/states/{state_id}/expected_withdrawals"
    summary: "Returns the expected withdrawals when building the next block based on the specified state"
    params: "state_id(path)"
    example: "GET /eth/v1/builder/states/head/expected_withdrawals"
  # ---------- Config ----------
  - name: "GET /eth/v1/config/fork_schedule"
    summary: "Returns the planned fork schedule"
    params: "none"
    example: "GET /eth/v1/config/fork_schedule"
  - name: "GET /eth/v1/config/spec"
    summary: "Returns the chain's spec parameters (SLOTS_PER_EPOCH, SECONDS_PER_SLOT, etc.)"
    params: "none"
    example: "GET /eth/v1/config/spec"
  - name: "GET /eth/v1/config/deposit_contract"
    summary: "Returns the deposit contract address"
    params: "none"
    example: "GET /eth/v1/config/deposit_contract"
  # ---------- Debug ----------
  - name: "GET /eth/v2/debug/beacon/states/{state_id}"
    summary: "Returns the full BeaconState object (large response)"
    params: "state_id(path)"
    example: "GET /eth/v2/debug/beacon/states/finalized"
  - name: "GET /eth/v2/debug/beacon/heads"
    summary: "Returns the fork-choice leaf node list"
    params: "none"
    example: "GET /eth/v2/debug/beacon/heads"
  - name: "GET /eth/v1/debug/fork_choice"
    summary: "Returns the fork-choice array"
    params: "none"
    example: "GET /eth/v1/debug/fork_choice"
  # ---------- Node ----------
  - name: "GET /eth/v1/node/identity"
    summary: "Returns the node's network identity (peer ID, ENR, multiaddresses)"
    params: "none"
    example: "GET /eth/v1/node/identity"
  - name: "GET /eth/v1/node/peers"
    summary: "Returns the node's list of network peers"
    params: "state/direction(query, optional)"
    example: "GET /eth/v1/node/peers"
  - name: "GET /eth/v1/node/peer_count"
    summary: "Returns the peer count by state"
    params: "none"
    example: "GET /eth/v1/node/peer_count"
  - name: "GET /eth/v1/node/version"
    summary: "Returns the Beacon node version string"
    params: "none"
    example: "GET /eth/v1/node/version"
  - name: "GET /eth/v1/node/syncing"
    summary: "Returns the node's sync status (syncing or not, head slot)"
    params: "none"
    example: "GET /eth/v1/node/syncing"
  - name: "GET /eth/v1/node/health"
    summary: "Health check endpoint (200 = OK, 206 = syncing, 503 = unavailable)"
    params: "syncing_status(query, optional)"
    example: "GET /eth/v1/node/health"
  # ---------- Events ----------
  - name: "GET /eth/v1/events"
    summary: "Subscribes to the Beacon node's SSE event stream"
    params: "topics(query, required): head/block/attestation/voluntary_exit/finalized_checkpoint/chain_reorg/contribution_and_proof"
    example: "GET /eth/v1/events?topics=head,block"
  # ---------- Validator ----------
  - name: "POST /eth/v1/validator/duties/attester/{epoch}"
    summary: "Returns attester duties for the specified epoch"
    params: "epoch(path); body: [validator_index]"
    example: "POST /eth/v1/validator/duties/attester/100  [\"0\",\"1\"]"
  - name: "GET /eth/v1/validator/duties/proposer/{epoch}"
    summary: "Returns block proposer duties for the specified epoch"
    params: "epoch(path)"
    example: "GET /eth/v1/validator/duties/proposer/100"
  - name: "POST /eth/v1/validator/duties/sync/{epoch}"
    summary: "Returns sync committee duties for the specified epoch"
    params: "epoch(path); body: [validator_index]"
    example: "POST /eth/v1/validator/duties/sync/100  [\"0\",\"1\"]"
  - name: "GET /eth/v3/validator/blocks/{slot}"
    summary: "Generates an unsigned block (for validator proposal)"
    params: "slot(path); randao_reveal/graffiti/skip_randao_verification(query)"
    example: "GET /eth/v3/validator/blocks/12345?randao_reveal=0x..."
  - name: "GET /eth/v1/validator/attestation_data"
    summary: "Generates attestation data"
    params: "slot/committee_index(query, required)"
    example: "GET /eth/v1/validator/attestation_data?slot=12345&committee_index=0"
  - name: "GET /eth/v1/validator/aggregate_attestation"
    summary: "Returns the aggregated attestation"
    params: "attestation_data_root/slot(query, required)"
    example: "GET /eth/v1/validator/aggregate_attestation?slot=12345&attestation_data_root=0x..."
  - name: "POST /eth/v1/validator/aggregate_and_proofs"
    summary: "Publishes multiple aggregate proofs"
    params: "body: [SignedAggregateAndProof]"
    example: "POST /eth/v1/validator/aggregate_and_proofs"
  - name: "POST /eth/v1/validator/beacon_committee_subscriptions"
    summary: "Notifies the node to prepare committee subnet subscriptions"
    params: "body: [BeaconCommitteeSubscription]"
    example: "POST /eth/v1/validator/beacon_committee_subscriptions"
  - name: "POST /eth/v1/validator/sync_committee_subscriptions"
    summary: "Subscribes to sync committee subnets"
    params: "body: [SyncCommitteeSubscription]"
    example: "POST /eth/v1/validator/sync_committee_subscriptions"
  - name: "GET /eth/v1/validator/sync_committee_contribution"
    summary: "Generates a sync committee contribution"
    params: "slot/subcommittee_index/beacon_block_root(query, required)"
    example: "GET /eth/v1/validator/sync_committee_contribution?slot=12345&subcommittee_index=0&beacon_block_root=0x..."
  - name: "POST /eth/v1/validator/contribution_and_proofs"
    summary: "Publishes multiple sync committee contribution proofs"
    params: "body: [SignedContributionAndProof]"
    example: "POST /eth/v1/validator/contribution_and_proofs"
  - name: "POST /eth/v1/validator/prepare_beacon_proposer"
    summary: "Submits validator proposer configuration (fee_recipient) to the node"
    params: "body: [BeaconProposerPreparation]"
    example: "POST /eth/v1/validator/prepare_beacon_proposer  [{\"validator_index\":\"0\",\"fee_recipient\":\"0x...\"}]"
  - name: "POST /eth/v1/validator/register_validator"
    summary: "Registers a validator with the external builder network"
    params: "body: [SignedValidatorRegistrationV1]"
    example: "POST /eth/v1/validator/register_validator"
  - name: "POST /eth/v1/validator/liveness/{epoch}"
    summary: "Checks whether validators are live in the specified epoch"
    params: "epoch(path); body: [validator_index]"
    example: "POST /eth/v1/validator/liveness/100  [\"0\",\"1\"]"
