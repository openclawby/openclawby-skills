# ============================================================================
# Secret Network — secret_network
# Dual interface: Tendermint JSON-RPC + Cosmos REST; neither is EVM JSON-RPC
# ============================================================================
chain: "secret_network"
type: "Secret(Cosmos REST/gRPC)"
slug: secret
status: unverified             # not verified on the current key; availability depends on the plan
api_style: Cosmos-REST
how_to_call: 'POST /api/rpc  {"chain":"secret_network","method":"<method>","params":[...]}'
notes:
  - "⚠️ This chain is in the Cosmos/Tendermint ecosystem, not standard EVM JSON-RPC; /api/rpc primarily proxies EVM JSON-RPC so this chain may not work — the resources/methods below are for reference"
  - "⚠️ not verified on the current key; availability depends on the plan"
  - "Secret Network supports two interfaces: (1) Tendermint JSON-RPC — POST format {jsonrpc,method,params,id}, methods include block/tx/validators etc. (not eth_* methods); (2) Cosmos REST — GET/POST paths such as /cosmos/base/tendermint/v1beta1/blocks/{height}"
  - "Tendermint JSON-RPC uses JSON-RPC format, but its method set is entirely different from EVM; whether /api/rpc can proxy it depends on the backend routing policy"
endpoints_or_methods:
  # Tendermint JSON-RPC — Info/Block methods
  - name: "blockchain"
    summary: "Returns block headers in the range minHeight ~ maxHeight (up to 20)"
  - name: "block"
    summary: "Returns full block info by height"
  - name: "block_by_hash"
    summary: "Returns block info by hash"
  - name: "block_results"
    summary: "Returns block execution results at the specified height (tx results/events)"
  - name: "commit"
    summary: "Returns commit info at the specified height (Commit + signatures)"
  - name: "validators"
    summary: "Returns the validator set at the specified height (supports pagination)"
  - name: "genesis_chunked"
    summary: "Returns the genesis document in chunks (16 MB each, Base64-encoded)"
  - name: "dump_consensus_state"
    summary: "Returns the full consensus state (includes peer info)"
  - name: "consensus_state"
    summary: "Returns a snapshot of the current consensus state"
  - name: "consensus_params"
    summary: "Returns consensus parameters at the specified height (max_bytes/max_gas, etc.)"
  - name: "unconfirmed_txs"
    summary: "Returns the list of unconfirmed transactions in the mempool"
  - name: "num_unconfirmed_txs"
    summary: "Returns a count of unconfirmed transactions in the mempool"
  - name: "tx_search"
    summary: "Searches transactions by condition (supports key=value query syntax)"
  - name: "block_search"
    summary: "Searches blocks by BeginBlock/EndBlock events"
  - name: "tx"
    summary: "Queries a single transaction by hash (can include Merkle proof)"
  # Tendermint JSON-RPC — Broadcast methods
  - name: "broadcast_tx_sync"
    summary: "Broadcasts a transaction and waits for CheckTx result, without waiting for DeliverTx"
  - name: "broadcast_tx_async"
    summary: "Returns immediately without waiting for CheckTx or DeliverTx"
  - name: "broadcast_tx_commit"
    summary: "Broadcasts a transaction and waits for both CheckTx and DeliverTx confirmation (test use only)"
  - name: "check_tx"
    summary: "Validates a transaction without executing it or adding it to the mempool"
  # Tendermint JSON-RPC — ABCI methods
  - name: "abci_info"
    summary: "Returns application info (version/latest block height, etc.)"
  - name: "abci_query"
    summary: "Queries arbitrary path data from the ABCI application (path + data)"
  # Cosmos REST endpoints
  - path: "GET /node_info"
    summary: "Returns properties of the connected node"
  - path: "POST /txs"
    summary: "Broadcasts a signed Cosmos transaction"
  - path: "POST /staking/delegators/{delegatorAddr}/delegations"
    summary: "Submits a staking delegation"
  - path: "POST /staking/delegators/{delegatorAddr}/unbonding_delegations"
    summary: "Submits an unbonding delegation"
