# ============================================================================
# Aptos REST API — aptos
# ⚠️ This chain uses a REST API, not standard JSON-RPC; /api/rpc currently has no Aptos nodes
# ============================================================================
chain: "aptos"
type: "Aptos(REST)"
slug: aptos
status: no_nodes               # no nodes currently available
api_style: REST
how_to_call: 'POST /api/rpc  {"chain":"aptos","method":"<method>","params":[...]}'
notes:
  - "⚠️ This chain uses the Aptos REST API, not standard JSON-RPC; /api/rpc primarily forwards JSON-RPC and does not apply to this chain — the paths below are listed for reference"
  - "⚠️ No Aptos nodes are currently available; calls will fail regardless of how they are routed"
  - "Aptos REST base path: /v1/; responses are JSON; some write operations (Submit transaction) are also POST but the body is JSON/BCS, not JSON-RPC"
endpoints_or_methods:
  # Accounts
  - path: "GET /v1/accounts/{address}"
    summary: "Returns the account's authentication_key and sequence_number"
  - path: "GET /v1/accounts/{address}/resources"
    summary: "Returns all resources for the account at the specified ledger_version"
  - path: "GET /v1/accounts/{address}/modules"
    summary: "Returns all module bytecode for the account at the specified ledger_version"
  - path: "GET /v1/accounts/{address}/resource/{resource_type}"
    summary: "Returns a single resource for the account (by Move type name)"
  - path: "GET /v1/accounts/{address}/module/{module_name}"
    summary: "Returns a single module's bytecode for the account"
  # Blocks
  - path: "GET /v1/blocks/by_height/{block_height}"
    summary: "Returns block info and transaction list by block height"
  - path: "GET /v1/blocks/by_version/{version}"
    summary: "Returns block info for the given ledger version"
  # Events
  - path: "GET /v1/accounts/{address}/events/{creation_number}"
    summary: "Returns events by creation_number"
  - path: "GET /v1/accounts/{address}/events/{event_handle}/{field_name}"
    summary: "Returns events by event handle and field name"
  # General
  - path: "GET /v1/"
    summary: "Returns the latest ledger info (chain_id, epoch, ledger_version, block_height, etc.)"
  # Table
  - path: "POST /v1/tables/{table_handle}/item"
    summary: "Reads a Move Table entry by key_type + value_type + key"
  - path: "POST /v1/tables/{table_handle}/raw_item"
    summary: "Reads a Move Table entry by raw hex key (returns BCS format)"
  # Transactions
  - path: "GET /v1/transactions"
    summary: "Returns the list of committed transactions on-chain (paginated)"
  - path: "POST /v1/transactions"
    summary: "Submits a transaction (JSON or BCS format)"
  - path: "GET /v1/transactions/by_hash/{txn_hash}"
    summary: "Queries a transaction by hash (including pending transactions in the mempool)"
  - path: "GET /v1/transactions/by_version/{txn_version}"
    summary: "Queries a confirmed transaction by ledger version"
  - path: "GET /v1/accounts/{address}/transactions"
    summary: "Returns committed on-chain transactions for the account"
  - path: "POST /v1/transactions/batch"
    summary: "Submits multiple transactions in batch"
  - path: "POST /v1/transactions/simulate"
    summary: "Simulates transaction submission (does not submit on-chain)"
  - path: "POST /v1/transactions/encode_submission"
    summary: "Encodes a UserTransactionRequestInner JSON as BCS"
  - path: "GET /v1/estimate_gas_price"
    summary: "Estimates the current gas unit price"
  # View
  - path: "POST /v1/view"
    summary: "Executes a Move module's view function and returns the result"
