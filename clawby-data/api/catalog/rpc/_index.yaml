# ============================================================================
# Clawby On-chain RPC (/api/rpc) — Master Index
# ============================================================================
how_to_call: 'POST /api/rpc  {"chain":"<chain>","method":"<method>","params":[...]}  header X-API-Key'
note: >
  Multi-chain JSON-RPC relay. EVM chain methods are in evm/<chain>.yaml (standard eth_*/web3_/net_, identical across
  all EVM chains, only chain/chain_id differ); non-EVM chain methods are in non-evm/<chain>.yaml. When calling, pass
  the chain name below as `chain` (not the internal slug).
status_legend:
  ok: "verified working"
  no_nodes: "no nodes for this chain currently"
  unverified: "not verified on the current key; availability depends on the plan"
evm_chains:   # 53 chains — standard EVM JSON-RPC; see evm/<chain>.yaml
