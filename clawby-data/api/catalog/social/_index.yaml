common_gotchas:
  - "All search interfaces (x_search / facebook_search / instagram_search) require the query param — missing it returns 422"
  - "Path-style ID params (post_id / media_id / profile_id / tag / username) must exist; use the corresponding search interface to retrieve them first"
  - "X handle params have no @; x_user_posts uses username, x_user_posts_search / x_replies use user — they are not interchangeable"
  - "x_trends: woeid=1 is global trends; count minimum is 30"
  - "instagram_search occasionally times out; retry or reduce count"
