# ============================================================================
# Derivatives — Futures Orderbook
# Call: POST /api/relay   {"name": "<name>", "params": {...}}
# ============================================================================
category: "Futures Orderbook"

gotchas_for_all:
  - "⚠️ Single-pair endpoints: use exchange + symbol=BTCUSDT (pair format)"
  - "⚠️ Aggregated endpoint (aggregated_ask_bids_history): use exchange_list (comma-separated) + symbol=BTC (coin name)"
  - "⚠️ futures_orderbook_history requires an extra limit param (number of heatmap price levels)"
  - "⚠️ futures_orderbook_large_limit_order_history requires three mandatory params: start_time, end_time, and state"
  - "⚠️ Response is {code, data}; success only when code='0'"

interfaces:
  - name: "futures_orderbook_ask_bids_history"
    summary: "Single-pair orderbook bid/ask history (volume distribution within a price range)"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT", note: "⚠️ use trading pair format"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: range, required: false, format: "price offset range (e.g. 2 means ±2%)", example: 2}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    example:
      name: "futures_orderbook_ask_bids_history"
      params: {exchange: "Binance", symbol: "BTCUSDT", interval: "1h"}

  - name: "futures_orderbook_aggregated_ask_bids_history"
    summary: "Aggregated orderbook bid/ask history across exchanges (by coin)"
    params:
      - {name: exchange_list, required: true, format: "comma-separated exchange names", example: "Binance,OKX"}
      - {name: symbol, required: true, format: "coin name", example: "BTC", note: "⚠️ use coin name BTC"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: range, required: false, format: "price offset range", example: 2}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    gotchas:
      - "⚠️ param is exchange_list, not exchange; symbol uses coin name BTC"
    example:
      name: "futures_orderbook_aggregated_ask_bids_history"
      params: {exchange_list: "Binance,OKX", symbol: "BTC", interval: "1h"}

  - name: "futures_orderbook_history"
    summary: "Orderbook heatmap historical data"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: limit, required: true, format: "integer, number of heatmap price levels", example: 100, note: "required; sets the number of price levels"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    gotchas:
      - "⚠️ limit is required here (unlike other endpoints where it is optional)"
    example:
      name: "futures_orderbook_history"
      params: {exchange: "Binance", symbol: "BTCUSDT", interval: "1h", limit: 100}

  - name: "futures_orderbook_large_limit_order"
    summary: "Current large limit order snapshot"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT"}
    example:
      name: "futures_orderbook_large_limit_order"
      params: {exchange: "Binance", symbol: "BTCUSDT"}

  - name: "futures_orderbook_large_limit_order_history"
    summary: "Historical large limit order records"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT"}
      - {name: start_time, required: true, format: "Unix milliseconds", example: 1700000000000}
      - {name: end_time, required: true, format: "Unix milliseconds", example: 1700086400000}
      - {name: state, required: true, format: "order state string", example: "all", note: "common values: all / filled / cancelled"}
    gotchas:
      - "⚠️ start_time, end_time, and state are all required; omitting any will cause an error"
    example:
      name: "futures_orderbook_large_limit_order_history"
      params: {exchange: "Binance", symbol: "BTCUSDT", start_time: 1700000000000, end_time: 1700086400000, state: "all"}
