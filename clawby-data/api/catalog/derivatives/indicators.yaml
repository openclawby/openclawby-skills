  # ── Special indicators (with params) ────────────────────────────────────────────────────────

  - name: "coinbase_premium_index"
    summary: "Coinbase premium index history (BTC price spread between Coinbase and other exchanges)"
    params:
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h", note: "⚠️ no symbol or exchange needed"}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    gotchas:
      - "⚠️ Only pass interval; symbol and exchange are not needed"
    example:
      name: "coinbase_premium_index"
      params: {interval: "1h"}

  - name: "borrow_interest_rate_history"
    summary: "Borrow interest rate history for a coin on a given exchange"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "coin name", example: "BTC", note: "⚠️ use coin name BTC, not trading pair BTCUSDT"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    gotchas:
      - "⚠️ symbol uses coin name BTC, not trading pair BTCUSDT (opposite of most futures endpoints)"
    example:
      name: "borrow_interest_rate_history"
      params: {exchange: "Binance", symbol: "BTC", interval: "1h"}
