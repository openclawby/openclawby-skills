# ============================================================================
# Derivatives — Market Indicators (Indicators / Indices)
# Call: POST /api/relay   {"name": "<name>", "params": {...}}
# ============================================================================
category: "Market Indicators (Indicators / Indices)"

gotchas_for_all:
  - "⚠️ Technical indicator endpoints (RSI/MA/EMA/BOLL/MACD/ATR/basis/whale_index) require exchange + symbol=BTCUSDT (trading pair) + interval"
  - "⚠️ Macro/on-chain index_* endpoints require no params; call them directly"
  - "⚠️ coinbase_premium_index only needs interval (no exchange/symbol)"
  - "⚠️ borrow_interest_rate_history: symbol uses coin name BTC, not trading pair BTCUSDT"
  - "⚠️ Common interval values: 1h / 4h / 1d"
  - "⚠️ Response is {code, data}; code='0' means success"

interfaces:
  # ── Technical indicators (futures trading-pair level) ──────────────────────────────────────────────

  - name: "futures_rsi_list"
    summary: "RSI snapshot list for all futures coins (no params required)"
    params: []
    example:
      name: "futures_rsi_list"
      params: {}

  - name: "futures_indicators_rsi"
    summary: "Per-pair RSI indicator history"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT", note: "⚠️ use trading pair format"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: window, required: false, format: "integer, RSI period", example: 14}
      - {name: series_type, required: false, format: "close/open/high/low", example: "close"}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    example:
      name: "futures_indicators_rsi"
      params: {exchange: "Binance", symbol: "BTCUSDT", interval: "1h"}

  - name: "futures_indicators_ma"
    summary: "Per-pair moving average (MA) history"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: window, required: false, format: "integer, MA period", example: 20}
      - {name: series_type, required: false, format: "close/open/high/low", example: "close"}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    example:
      name: "futures_indicators_ma"
      params: {exchange: "Binance", symbol: "BTCUSDT", interval: "1h"}

  - name: "futures_ma_list"
    summary: "MA snapshot list for all futures coins (no params required)"
    params: []
    example:
      name: "futures_ma_list"
      params: {}

  - name: "futures_indicators_ema"
    summary: "Per-pair exponential moving average (EMA) history"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: window, required: false, format: "integer, EMA period", example: 20}
      - {name: series_type, required: false, format: "close/open/high/low", example: "close"}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    example:
      name: "futures_indicators_ema"
      params: {exchange: "Binance", symbol: "BTCUSDT", interval: "1h"}

  - name: "futures_ema_list"
    summary: "EMA snapshot list for all futures coins (no params required)"
    params: []
    example:
      name: "futures_ema_list"
      params: {}

  - name: "futures_indicators_boll"
    summary: "Per-pair Bollinger Bands history"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: window, required: false, format: "integer, BOLL period", example: 20}
      - {name: mult, required: false, format: "number, standard deviation multiplier", example: 2}
      - {name: series_type, required: false, format: "close/open/high/low", example: "close"}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
      - {name: end_time, required: false, format: "Unix milliseconds"}
    example:
      name: "futures_indicators_boll"
      params: {exchange: "Binance", symbol: "BTCUSDT", interval: "1h"}

  - name: "futures_indicators_macd"
    summary: "Per-pair MACD indicator history"
    params:
      - {name: exchange, required: true, format: "exchange name", example: "Binance"}
      - {name: symbol, required: true, format: "trading pair", example: "BTCUSDT"}
      - {name: interval, required: true, format: "1h/4h/1d", example: "1h"}
      - {name: fast_window, required: false, format: "integer, fast-line period", example: 12}
      - {name: slow_window, required: false, format: "integer, slow-line period", example: 26}
      - {name: signal_window, required: false, format: "integer, signal-line period", example: 9}
      - {name: series_type, required: false, format: "close/open/high/low", example: "close"}
      - {name: limit, required: false, format: "integer"}
      - {name: start_time, required: false, format: "Unix milliseconds"}
