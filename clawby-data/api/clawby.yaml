      Data is delayed during trial. You can activate your subscription and get live data by clicking "Skip Trial" on the Premium tab of your account.
      GET /screener/stocks/
      Parameters (* = required):
        - view_cols (string): List of Column values from /screener/stocks/columns/. ex: display,reg_price,reg_date,reg_change_pct,market_cap,reg_volume,name,industry
        - per_page (number): Results per page. Max 100.
        - page (number): Page number
        - sort (string): Column,Direction ex: market_cap,desc
        - symbol (string): List of symbols. ex: AAPL,SPY
        - region (string): List of Region values from /screener/stocks/groups/region/. ex: US,CA
        - equity_type (string): List of EquityType values from /screener/stocks/groups/equity-type/. ex: cs,et,ad
        - exchange (string): List of Exchange values from /screener/stocks/groups/exchange/. ex: NASDAQ,NYSE,NYSEAMERICAN,BATS
        - currency (string): List of Currency values from /screener/stocks/groups/currency/. ex: USD
        - sector (string): List of Sector values from /screener/stocks/groups/sector/. ex: 3,10
        - industry (string): List of Industry values from /screener/stocks/groups/industry/. ex: 38,114,78
        - country (string): List of Country values from /screener/stocks/groups/country/. ex: United States,Canada
        - next_earnings (string): List of NextEarnings values from /screener/stocks/groups/next-earnings/. ex: 2024-04-15,2024-04-16
        - options (string): List of Options values from /screener/stocks/groups/options/. ex: Y
        - market_cap (string): Market Cap. ex: >1B <1T
        - thirty_day_avg_vol (string): 30 Day Avg Volume. ex: >=10m
        - relative_vol (string): Relative Volume. ex: >2.5
        - reg_volume (string): Volume
        - ten_day_avg_vol (string): 10 Day Avg Volume. ex: >=1m
        - shares_out (string): Shares Out.
        - pe_ratio (string): P/E Ratio
        - six_month_beta (string): Six Month Beta
        - one_year_beta (string): 1 Year Beta
        - two_year_beta (string): 2 Year Beta
        - five_year_beta (string): 5 Year Beta
        - employees (string): Employees
        - reg_price (string): Price
        - reg_change_pct (string): Day %. ex: <-5
        - open_change_pct (string): Change From Open %. ex: >2
        - pre_change_pct (string): Pre-market %
        - ah_change_pct (string): After-hours %
        - one_week_change_pct (string): 1 Week %
        - one_month_change_pct (string): 1 Month %
        - mtd_change_pct (string): Month-to-date %
        - three_month_change_pct (string): 3 Month %
        - six_month_change_pct (string): 6 Month %
        - one_year_change_pct (string): 1 Year %
        - ytd_change_pct (string): Year-to-date %
        - two_year_change_pct (string): 2 Year %
        - three_year_change_pct (string): 3 Year %
        - five_year_change_pct (string): 5 Year %
        - borrow_fee_rate_ib (string): Borrow Fee % IBKR
        - format (string; csv/json)
      Common: page/page_size (max 1000), ordering=field|-field, format=json|csv
      Symbols: stocks US:TICKER · crypto BASE:USD · forex BASE:USD
