  - id: 34
    name: "Crypto level 2 snapshots"
    asset_classes: "crypto"
    data_types: "orderbook-l2"
    description: "Crypto level 2 snapshots — <p>Minute-by-minute snapshots covering 10% above and 10% below the mid point.<br><br>The following pairs have 180 days of history: [\"BTC:USD\", \"BTC:USDT\", \"ETH:USD\", \"ETH:USDT\"]. All other pairs have "
    docs: |
      Crypto level 2 snapshots
      <p>Minute-by-minute snapshots covering 10% above and 10% below the mid point.<br><br>The following pairs have 180 days of history: ["BTC:USD", "BTC:USDT", "ETH:USD", "ETH:USDT"]. All other pairs have 7 days of history.</p><p>Response <code>depth</code>: <ul><li>JSON string of the form "[bids, asks]"
      GET /data/crypto/level-2-snapshots/
      Parameters (* = required):
        - symbol* (string): Crypto pair. ex: BTC:USD
        - exchange* (string): Crypto exchange. ex: COINBASE
        - start* (string): Start of the time window (UTC) as a Unix timestamp (ex: 1754028000) or datetime (ex: 2025-08-01 06:00:00)
        - end (string): End of the time window (UTC) as a Unix timestamp (ex: 1754028000) or datetime (ex: 2025-08-01 06:00:00)
        - ordering (string): Sortable on: timestamp. Default: timestamp.
        - page (integer): A page number within the paginated result set.
        - page_size (integer): Number of results to return per page.
        - format (string; csv/json)
      Common: page/page_size (max 1000), ordering=field|-field, format=json|csv
      Symbols: stocks US:TICKER · crypto BASE:USD · forex BASE:USD
  - id: 35
