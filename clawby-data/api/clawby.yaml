  - id: 46
    name: "polymarket_events"
    asset_classes: "prediction_market"
    data_types: "events,markets,odds"
    description: "Prediction-market events (each event contains its markets). Browse trending/active prediction markets."
    docs: |
      Params: active(true/false), closed(true/false), limit(1-500, default 20), offset(pagination), order(volume_24hr|volume|liquidity|start_date|end_date|competitive), ascending(true/false), tag_id(filter by category, from polymarket_tags), series_id(sports), slug(exact event from polymarket.com/event/{slug}). Default include active=true&closed=false. Prefer events over markets (fewer calls). Response has has_more for pagination.
  - id: 47
    name: "polymarket_markets"
    asset_classes: "prediction_market"
    data_types: "markets,outcomes,prices"
    description: "Individual prediction markets with outcome tokens, prices, and orderbook flags."
    docs: |
      Params: slug(exact market), limit, offset, active, closed, order(liquidity|volume24hr), ascending. Key fields: clobTokenIds (JSON array of outcome token ids → use with CLOB endpoints), conditionId, enableOrderBook, neg_risk, outcomes, outcomePrices, lastTradePrice, volume, liquidity.
  - id: 48
    name: "polymarket_tags"
    asset_classes: "prediction_market"
    data_types: "tags,categories"
    description: "Category tags for filtering prediction-market events (politics, sports, crypto, etc.)."
    docs: |
      Params: limit, offset. Returns tag id + label; use the id as tag_id in polymarket_events.
  - id: 49
    name: "polymarket_sports"
    asset_classes: "prediction_market"
    data_types: "sports,series"
    description: "Sports metadata (leagues / series) for prediction markets."
    docs: |
      No required params. Returns sports series metadata; use series_id in polymarket_events.
  - id: 50
    name: "polymarket_orderbook"
    asset_classes: "prediction_market"
    data_types: "orderbook,depth,bids,asks"
    description: "Live order book (bids/asks) for a prediction-market outcome token."
    docs: |
      Param: token_id (required, an outcome token id from market.clobTokenIds). Returns bids/asks [{price,size}], tick_size, neg_risk. 404 'No orderbook' = that token has no live book.
  - id: 51
    name: "polymarket_price"
    asset_classes: "prediction_market"
    data_types: "price,probability"
    description: "Best price (probability) for a prediction-market outcome token."
    docs: |
      Params: token_id (required), side (BUY=best ask, SELL=best bid). Price 0-1 = implied probability.
  - id: 52
    name: "polymarket_midpoint"
    asset_classes: "prediction_market"
    data_types: "price,midpoint,probability"
    description: "Midpoint price (implied probability) for an outcome token."
    docs: |
      Param: token_id (required). Returns {mid}. If spread>0.10 the UI shows last trade price instead.
  - id: 53
    name: "polymarket_spread"
    asset_classes: "prediction_market"
    data_types: "spread,liquidity"
    description: "Bid-ask spread for an outcome token (liquidity gauge)."
    docs: |
      Param: token_id (required). Returns {spread}.
  - id: 54
    name: "polymarket_price_history"
    asset_classes: "prediction_market"
    data_types: "price_history,timeseries"
    description: "Historical price (probability) time series for an outcome token."
    docs: |
      Params: market (required = the outcome token id), interval(1h|6h|1d|1w|1m|max) OR startTs/endTs (unix seconds, mutually exclusive with interval), fidelity (minutes between points, e.g. 60). Each point {t: unix_ts, p: price}.
  - id: 55
    name: "polymarket_trades"
    asset_classes: "prediction_market"
    data_types: "trades,fills"
    description: "Recent trades on prediction markets."
    docs: |
      Params: market (condition id), user (0x wallet), limit, offset, takerOnly(true/false). All optional; returns recent fills.
  - id: 56
    name: "polymarket_value"
    asset_classes: "prediction_market"
    data_types: "positions,value,portfolio"
    description: "Current USD value of a wallet's open prediction-market positions."
    docs: |
      Param: user (required, 0x wallet address). Returns position value.
  - id: 57
    name: "hyperliquid_all_mids"
    asset_classes: "perp,spot,crypto"
    data_types: "price,mids"
    description: "All current mid prices on Hyperliquid (perps + spot)."
    docs: |
      No params. Returns {coin: midPrice}. Coin names are perp symbols (BTC, ETH…) or spot @index / token names.
  - id: 58
    name: "hyperliquid_perp_meta"
    asset_classes: "perp,spot,crypto"
    data_types: "perp,meta,universe"
    description: "Hyperliquid perpetuals universe / metadata."
    docs: |
      No params. universe[]: {name, szDecimals, maxLeverage, marginTableId}. Use names as `coin` in other calls.
  - id: 59
    name: "hyperliquid_perp_contexts"
    asset_classes: "perp,spot,crypto"
    data_types: "perp,funding,open_interest,mark_price"
    description: "Hyperliquid perp metadata + live per-asset context: mark/oracle price, funding, open interest, volume."
    docs: |
      No params. Returns [meta, assetCtxs[]] aligned with universe order. Each ctx: {markPx, oraclePx, funding, openInterest, premium, dayNtlVlm, prevDayPx}.
  - id: 60
    name: "hyperliquid_spot_meta"
    asset_classes: "perp,spot,crypto"
    data_types: "spot,meta,tokens"
    description: "Hyperliquid spot tokens and trading pairs metadata."
    docs: |
      No params. tokens[] and universe[] (pairs). Pair index maps to @{index} coin used in spot queries.
  - id: 61
    name: "hyperliquid_spot_contexts"
    asset_classes: "perp,spot,crypto"
    data_types: "spot,price,supply"
    description: "Hyperliquid spot metadata + live context: mark/mid price, circulating supply, volume."
    docs: |
      No params. Returns [meta, ctxs[]]. Each ctx: {markPx, midPx, circulatingSupply, dayNtlVlm, prevDayPx}.
  - id: 62
    name: "hyperliquid_l2_book"
    asset_classes: "perp,spot,crypto"
    data_types: "orderbook,depth"
    description: "Hyperliquid order book (L2) for a coin."
    docs: |
      Params: coin (required, e.g. 'BTC' for perp or spot pair name). Optional: nSigFigs(2-5), mantissa. Returns {coin, time, levels:[bids,asks]} where each level {px, sz, n}.
  - id: 63
    name: "hyperliquid_candles"
    asset_classes: "perp,spot,crypto"
    data_types: "ohlc,candles,price_history"
    description: "Hyperliquid OHLC candle history for a coin."
    docs: |
      Param: req (required, an OBJECT): {coin, interval(1m|5m|15m|1h|4h|1d|1w), startTime(ms epoch), endTime(ms epoch)}. Example params: {"req":{"coin":"BTC","interval":"1h","startTime":1719360000000,"endTime":1719446400000}}. Each candle: {t,T,s,i,o,h,l,c,v,n}.
  - id: 64
    name: "hyperliquid_funding_history"
    asset_classes: "perp,spot,crypto"
    data_types: "funding,history"
    description: "Historical funding rates for a Hyperliquid perp."
    docs: |
      Params: coin (required), startTime (ms epoch, required), endTime (ms epoch, optional). Returns [{coin, fundingRate, premium, time}].
  - id: 65
    name: "hyperliquid_predicted_fundings"
    asset_classes: "perp,spot,crypto"
    data_types: "funding,predicted"
    description: "Predicted next funding rates across venues for Hyperliquid perps."
    docs: |
      No params. Returns per-coin predicted funding across venues (HlPerp, BinPerp, etc.).
  - id: 66
    name: "hyperliquid_user_state"
    asset_classes: "perp,spot,crypto"
    data_types: "positions,margin,account"
