    docs: |
      Param: user (required, 0x wallet address). Returns assetPositions[], marginSummary, withdrawable.
  - id: 67
    name: "hyperliquid_spot_user_state"
    asset_classes: "perp,spot,crypto"
    data_types: "spot,balances,account"
    description: "A wallet's Hyperliquid spot balances."
    docs: |
      Param: user (required, 0x wallet address). Returns balances[] {coin, total, hold}.
  - id: 68
    name: "hyperliquid_open_orders"
    asset_classes: "perp,spot,crypto"
    data_types: "orders,open"
    description: "A wallet's open orders on Hyperliquid."
    docs: |
      Param: user (required, 0x wallet address). Returns open orders [{coin, side, limitPx, sz, oid, timestamp}].
  - id: 69
    name: "hyperliquid_user_fills"
    asset_classes: "perp,spot,crypto"
    data_types: "fills,trades,history"
    description: "A wallet's recent fills (trade history) on Hyperliquid."
    docs: |
      Param: user (required, 0x wallet address). Returns recent fills [{coin, px, sz, side, time, closedPnl, fee}].
  - id: 70
    name: "sec_cik_lookup"
    asset_classes: "us_equities,fundamentals"
    data_types: "cik,ticker,filings"
    description: "Resolve a US stock ticker to its SEC CIK number (needed by all other SEC interfaces) + recent filings."
    docs: |
      Find a company CIK by name via SEC EDGAR (browse-edgar). Returns Atom XML, not JSON. Parameters: company* (company name, e.g. "Apple Inc"; ticker symbols are not supported here). Optional: type (filing-type filter, e.g. 10-K). Read the <cik> value from the returned XML, then use it with sec_company_concept / sec_submissions.
  - id: 71
    name: "sec_company_concept"
    asset_classes: "us_equities,fundamentals"
    data_types: "financials,income_statement,balance_sheet,cash_flow"
    description: "One financial-statement line item (us-gaap concept) for a company across all reported periods."
    docs: |
      One US-GAAP financial concept for a company across all reported periods (SEC XBRL companyconcept). Parameters: cik* (company CIK; plain digits are fine and auto-padded to 10, e.g. 320193 or 0000320193), concept* (a us-gaap tag, e.g. NetIncomeLoss, Revenues, Assets, EarningsPerShareDiluted). Returns JSON with every annual and quarterly value. If you only have a ticker, resolve the CIK first with sec_cik_lookup.
  - id: 72
    name: "sec_submissions"
    asset_classes: "us_equities,fundamentals"
    data_types: "filings,profile,company"
    description: "A company's profile + recent SEC filing history (10-K/10-Q/8-K…)."
    docs: |
      Company profile and full filing history (SEC submissions). Parameters: cik* (company CIK; plain digits are fine and auto-padded to 10, e.g. 320193). Returns JSON: company name, SIC, tickers, exchanges, and recent filings with accession numbers. If you only have a ticker, resolve the CIK first with sec_cik_lookup.
  - id: 74
    name: "dexscreener_search"
    asset_classes: "crypto,dex"
    data_types: "dex,pairs,price,liquidity"
    description: "Search DEX trading pairs across all chains by token name, symbol, or address."
    docs: |
      Param: q (required, e.g. 'WBTC' or a token address). Returns pairs[] with chainId, dexId, baseToken/quoteToken, priceUsd, priceNative, liquidity.usd, volume (m5/h1/h6/h24), priceChange, fdv, marketCap, txns, pairAddress.
  - id: 75
    name: "dexscreener_token_pools"
    asset_classes: "crypto,dex"
    data_types: "dex,pools,price,liquidity"
    description: "Get DEX pools/pairs for one or more token addresses on a specific chain."
    docs: |
      Path params: chainId (e.g. solana, ethereum, base, bsc), tokenAddresses (one address, or up to 30 comma-separated). Returns the pools array for those tokens on that chain (price, liquidity, volume, etc.).
  - id: 76
    name: "dexscreener_token_pairs"
    asset_classes: "crypto,dex"
    data_types: "dex,pairs,price"
    description: "Get all DEX pairs for a token across ALL chains (by token address)."
    docs: |
      Path param: tokenAddresses (one address, or up to 30 comma-separated). Returns pairs[] across every chain the token trades on. Use this when the chain is unknown.
  - id: 77
    name: "dexscreener_pair"
    asset_classes: "crypto,dex"
    data_types: "dex,pair,price"
    description: "Get a single DEX pair by chain + pair (pool) address."
    docs: |
      Path params: chainId (e.g. solana, ethereum), pairId (the pair/pool address). Returns full pair stats: priceUsd, liquidity, volume, txns, priceChange, fdv, marketCap.
  - id: 78
    name: "dexscreener_token_profiles"
    asset_classes: "crypto,dex"
    data_types: "dex,profiles,tokens"
    description: "Latest token profiles listed on DexScreener (links, description, socials)."
    docs: |
      No params. Returns recent token profiles: url, chainId, tokenAddress, description, links/socials.
  - id: 79
    name: "dexscreener_token_boosts_latest"
    asset_classes: "crypto,dex"
    data_types: "dex,boosts,tokens"
    description: "Latest boosted tokens on DexScreener."
    docs: |
      No params. Returns recently boosted tokens (chainId, tokenAddress, amount, totalAmount, description, links).
  - id: 80
    name: "dexscreener_token_boosts_top"
    asset_classes: "crypto,dex"
    data_types: "dex,boosts,trending"
    description: "Tokens with the most active boosts on DexScreener."
    docs: |
      No params. Returns top-boosted tokens ranked by active boost amount.
  - id: 81
    name: "dexscreener_orders"
    asset_classes: "crypto,dex"
    data_types: "dex,orders,status"
    description: "Check paid DexScreener orders (profile/boost) for a token."
    docs: |
      Path params: chainId, tokenAddress. Returns {orders, boosts} the token has paid for (e.g. tokenProfile, tokenAd, communityTakeover) with status & timestamps.
  - id: 82
    name: "x_search"
    asset_classes: "social,search"
    data_types: "social,x,twitter,search,posts"
